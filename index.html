<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Engranaje 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #080c12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 680px;
            width: 100%;
        }
        .gear {
            width: 160px;
            height: 160px;
            margin: 0 auto 38px;
            animation: spin 14s linear infinite;
            filter: drop-shadow(0 0 18px rgba(15, 60, 140, 0.8)) drop-shadow(0 0 45px rgba(8, 35, 100, 0.6)) drop-shadow(0 0 80px rgba(4, 18, 60, 0.45));
        }
        .gear svg {
            display: block;
            width: 100%;
            height: 100%;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .countdown {
            color: #3a7ab8;
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            background: rgba(6, 18, 50, 0.25);
            padding: 18px 28px;
            border-radius: 18px;
            border: 1px solid rgba(20, 60, 140, 0.35);
            display: inline-block;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums;
            box-shadow: 0 0 30px rgba(8, 35, 120, 0.15), inset 0 1px 0 rgba(60, 120, 200, 0.08);
        }
        .frase {
            color: #b8c8dd;
            font-size: 1.4rem;
            line-height: 1.7;
            max-width: 560px;
            margin: 0 auto 20px;
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        .frase strong {
            color: #3a7ab8;
            font-weight: 500;
        }
        .instruccion {
            color: #8aa0b8;
            font-size: 1.1rem;
            line-height: 1.7;
            margin: 10px 0 16px;
        }
        .correo {
            color: #3a7ab8;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(10, 35, 90, 0.12);
            padding: 12px 30px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid rgba(20, 60, 140, 0.3);
            margin-top: 4px;
        }
        .footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.07);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        @media (max-width: 500px) {
            .gear { width: 120px; height: 120px; }
            .countdown { font-size: 2.8rem; padding: 14px 18px; }
            .frase { font-size: 1.15rem; padding: 0 6px; }
            .instruccion { font-size: 0.95rem; }
            .correo { font-size: 1.1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="gear">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="metalBase" x1="15%" y1="0%" x2="85%" y2="100%">
                        <stop offset="0%" stop-color="#8ab8e0" />
                        <stop offset="12%" stop-color="#2a5fa0" />
                        <stop offset="35%" stop-color="#0d3a78" />
                        <stop offset="62%" stop-color="#071e50" />
                        <stop offset="85%" stop-color="#03102e" />
                        <stop offset="100%" stop-color="#020918" />
                    </linearGradient>
                    <linearGradient id="dienteClaro" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#7aaad0" />
                        <stop offset="30%" stop-color="#1c508a" />
                        <stop offset="70%" stop-color="#0a2f62" />
                        <stop offset="100%" stop-color="#040f2e" />
                    </linearGradient>
                    <linearGradient id="dienteOscuro" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#1a5fa8" />
                        <stop offset="50%" stop-color="#0a3570" />
                        <stop offset="100%" stop-color="#030f2a" />
                    </linearGradient>
                    <radialGradient id="cuerpoRadial" cx="38%" cy="32%" r="65%">
                        <stop offset="0%" stop-color="#3a7ab8" />
                        <stop offset="20%" stop-color="#103a80" />
                        <stop offset="50%" stop-color="#071e58" />
                        <stop offset="80%" stop-color="#030f32" />
                        <stop offset="100%" stop-color="#010718" />
                    </radialGradient>
                    <linearGradient id="anilloReflejo" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4a90c8" stop-opacity="0.85" />
                        <stop offset="40%" stop-color="#0d3a80" stop-opacity="0.6" />
                        <stop offset="100%" stop-color="#020918" stop-opacity="0.4" />
                    </linearGradient>
                    <radialGradient id="nucleoGrad" cx="40%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#5a9acc" />
                        <stop offset="40%" stop-color="#0f3878" />
                        <stop offset="100%" stop-color="#030e38" />
                    </radialGradient>
                    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
                        <feOffset dx="1" dy="2" result="offsetBlur" />
                        <feComposite in="SourceGraphic" in2="offsetBlur" operator="over" />
                    </filter>
                </defs>
                <circle cx="50" cy="50" r="30" fill="#020a1e" opacity="0.6" transform="translate(1.5, 2)" />
                <circle cx="50" cy="50" r="28" fill="url(#cuerpoRadial)" />
                <circle cx="50" cy="50" r="28" fill="none" stroke="url(#anilloReflejo)" stroke-width="2.2" />
                <circle cx="50" cy="50" r="26.5" fill="none" stroke="rgba(180,225,255,0.18)" stroke-width="0.8" />
                <g fill="url(#dienteClaro)" stroke="#041530" stroke-width="1.2">
                    <rect x="44" y="6" width="12" height="22" rx="2.5" />
                    <rect x="44" y="72" width="12" height="22" rx="2.5" />
                    <rect x="6" y="44" width="22" height="12" rx="2.5" />
                    <rect x="72" y="44" width="22" height="12" rx="2.5" />
                    <rect x="18" y="16" width="12" height="22" rx="2.5" transform="rotate(45 24 27)" />
                    <rect x="70" y="62" width="12" height="22" rx="2.5" transform="rotate(45 76 73)" />
                    <rect x="18" y="62" width="12" height="22" rx="2.5" transform="rotate(-45 24 73)" />
                    <rect x="70" y="16" width="12" height="22" rx="2.5" transform="rotate(-45 76 27)" />
                </g>
                <g fill="none" stroke="rgba(100,160,220,0.35)" stroke-width="0.7">
                    <rect x="44.5" y="6.5" width="11" height="21" rx="2" />
                    <rect x="44.5" y="72.5" width="11" height="21" rx="2" />
                    <rect x="6.5" y="44.5" width="21" height="11" rx="2" />
                    <rect x="72.5" y="44.5" width="21" height="11" rx="2" />
                    <rect x="18.5" y="16.5" width="11" height="21" rx="2" transform="rotate(45 24 27)" />
                    <rect x="70.5" y="62.5" width="11" height="21" rx="2" transform="rotate(45 76 73)" />
                    <rect x="18.5" y="62.5" width="11" height="21" rx="2" transform="rotate(-45 24 73)" />
                    <rect x="70.5" y="16.5" width="11" height="21" rx="2" transform="rotate(-45 76 27)" />
                </g>
                <circle cx="50" cy="50" r="44" fill="none" stroke="url(#anilloReflejo)" stroke-width="1" opacity="0.5" />
                <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(40,90,180,0.12)" stroke-width="0.5" />
                <circle cx="50" cy="50" r="13" fill="#04090f" />
                <circle cx="50" cy="50" r="13" fill="none" stroke="rgba(30,80,160,0.6)" stroke-width="1.8" />
                <circle cx="50" cy="50" r="11.5" fill="none" stroke="rgba(80,140,200,0.12)" stroke-width="0.6" />
                <circle cx="50" cy="50" r="7" fill="url(#nucleoGrad)" />
                <circle cx="50" cy="50" r="7" fill="none" stroke="rgba(60,130,200,0.45)" stroke-width="1" />
                <circle cx="47" cy="47" r="2.2" fill="rgba(120,180,230,0.4)" />
                <circle cx="46.5" cy="46.5" r="0.9" fill="rgba(180,220,255,0.65)" />
            </svg>
        </div>

        <div class="countdown" id="countdown">-- : -- : -- : --</div>

        <div class="frase">
            <strong>"Un engrane no mueve una máquina,</strong><br />
            pero una máquina se mueve mejor<br />
            con el engrane correcto."
        </div>

        <div class="instruccion">
            Si crees que eres tú,<br />
            envía un correo con tu <strong>nombre</strong> y la palabra <strong>"SÍ" y tu numero de whatsapp</strong> a:
        </div>

        <div class="correo">📩 engranaje2026@gmail.com</div>
        <div class="footer">✦</div>
    </div>

    <script>
        // FECHA FIJA: 26 de junio de 2026 a las 23:59:59
        // ¡Así NO se reinicia nunca!
        const fechaLimite = new Date(2026, 6, 6, 23, 59, 59);

        function actualizarContador() {
            const ahora2 = new Date();
            let diff = fechaLimite - ahora2;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = '00 : 00 : 00 : 00';
                return;
            }

            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML =
                String(dias).padStart(2, '0') + ' : ' +
                String(horas).padStart(2, '0') + ' : ' +
                String(minutos).padStart(2, '0') + ' : ' +
                String(segundos).padStart(2, '0');
        }

        actualizarContador();
        setInterval(actualizarContador, 1000);
    </script>

</body>
</html>
